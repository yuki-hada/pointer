name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: dist/*.exe
          - os: macos-14
            script: build:mac
            artifact: dist/*.dmg
          - os: ubuntu-latest
            script: build:linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip code signing

      - uses: actions/upload-artifact@v4
        with:
          name: pointer-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
